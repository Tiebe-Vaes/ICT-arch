<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>POC1 - OAuth + JWT</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: .6rem 1rem; font-size: 1rem; cursor: pointer; margin-right: .5rem; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    .row { margin: 1rem 0; }
    code { background: #eee; padding: 1px 4px; border-radius: 3px; }
    .req { background: #eef6ff; }
    .res { background: #f4f4f4; }
    h3 { margin: 1.2rem 0 .3rem; }
  </style>
</head>
<body>
  <h1>POC1 - GitHub OAuth + JWT</h1>

  <div class="row">
    <button id="login">Login with GitHub</button>
    <small>fires: <code>GET /login</code> (browser navigate, 302 redirect naar github.com)</small>
  </div>

  <div class="row">
    <button id="me">Call /me</button>
    <button id="logout">Logout (revoke)</button>
    <button id="clear">Clear token</button>
    <small>fires: <code>GET /me</code> of <code>POST /logout</code> met Bearer</small>
  </div>

  <div class="row">
    <strong>JWT (localStorage):</strong>
    <pre id="tokenBox">none</pre>
  </div>

  <h3>Laatste request</h3>
  <pre id="reqBox" class="req">-</pre>

  <h3>Laatste response</h3>
  <pre id="resBox" class="res">-</pre>

  <script>
    const tokenBox = document.getElementById('tokenBox');
    const reqBox = document.getElementById('reqBox');
    const resBox = document.getElementById('resBox');

    // Token uit URL (na callback redirect) of uit localStorage.
    const urlToken = new URLSearchParams(location.search).get('token');
    if (urlToken) {
      localStorage.setItem('jwt', urlToken);
      reqBox.textContent = 'GET /login\n  -> 302 https://github.com/login/oauth/authorize?...\n(user logt in en consent op github.com)\n  -> 302 /callback?code=...&state=...\n  (server doet back-channel POST naar github, krijgt access_token, fetcht /user, signt eigen JWT)\n  -> 302 /?token=<JWT>';
      resBox.textContent = 'JWT ontvangen en opgeslagen in localStorage.';
      history.replaceState({}, '', '/');
    }
    tokenBox.textContent = localStorage.getItem('jwt') || 'none';

    document.getElementById('login').onclick = () => {
      reqBox.textContent = 'GET /login\n(browser navigeert, server antwoordt 302 naar github.com/login/oauth/authorize)';
      resBox.textContent = 'redirecting...';
      window.location.href = '/login';
    };

    document.getElementById('me').onclick = async () => {
      const jwt = localStorage.getItem('jwt');
      if (!jwt) { resBox.textContent = 'No token. Login first.'; return; }
      reqBox.textContent = `GET /me\nAuthorization: Bearer ${jwt}`;
      const r = await fetch('/me', { headers: { Authorization: 'Bearer ' + jwt } });
      const body = await r.text();
      resBox.textContent = `${r.status} ${r.statusText}\n\n${body}`;
    };

    document.getElementById('logout').onclick = async () => {
      const jwt = localStorage.getItem('jwt');
      if (!jwt) { resBox.textContent = 'No token.'; return; }
      reqBox.textContent = `POST /logout\nAuthorization: Bearer ${jwt}`;
      const r = await fetch('/logout', { method: 'POST', headers: { Authorization: 'Bearer ' + jwt } });
      resBox.textContent = `${r.status} ${r.statusText}\n\n${await r.text()}\n\n(token nog in localStorage - probeer /me opnieuw)`;
    };

    document.getElementById('clear').onclick = () => {
      localStorage.removeItem('jwt');
      tokenBox.textContent = 'none';
      reqBox.textContent = '-';
      resBox.textContent = '-';
    };
  </script>
</body>
</html>
