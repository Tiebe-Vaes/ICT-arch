version: "3.9"

services:
  app:
    image: poc1-app:latest
    build: ./app
    hostname: "replica-{{.Task.Slot}}"
    environment:
      PORT: 8080
      CALLBACK_URL: http://localhost:8080/callback
      REDIS_URL: redis://redis:6379
    secrets:
      - github_client_id
      - github_client_secret
      - jwt_secret
    ports:
      - "8080:8080"
    deploy:
      replicas: 3
      restart_policy:
        condition: any

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any

secrets:
  github_client_id:
    external: true
  github_client_secret:
    external: true
  jwt_secret:
    external: true
