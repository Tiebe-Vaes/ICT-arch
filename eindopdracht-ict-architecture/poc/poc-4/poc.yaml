version: "3.9"

configs:
  init_sql:
    file: ./init.sql

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: budgetdb
    configs:
      - source: init_sql
        target: /docker-entrypoint-initdb.d/init.sql
    deploy:
      replicas: 1
    networks:
      - default

  app:
    image: poc-04-app
    environment:
      DB_HOST: db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    networks:
      - default
    depends_on:
      - db

networks:
  default:
    driver: overlay
